name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      targets:
        description: Which sites to deploy
        type: choice
        options: [both, com, ru]
        default: both

# Don't let two deploys race against each other on the same server.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:

  deploy-com:
    name: Deploy redobureau.com
    runs-on: ubuntu-latest
    if: >-
      ${{ github.event_name != 'workflow_dispatch'
          || inputs.targets == 'both'
          || inputs.targets == 'com' }}
    steps:
      - uses: actions/checkout@v4

      - name: Load SSH key into agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY_COM }}

      - name: Trust host key
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST_COM }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync to ${{ secrets.DEPLOY_HOST_COM }}
        run: |
          rsync -avz --delete \
            --exclude-from=.deployignore \
            -e "ssh -o StrictHostKeyChecking=accept-new" \
            ./ ${{ secrets.DEPLOY_USER_COM }}@${{ secrets.DEPLOY_HOST_COM }}:${{ secrets.DEPLOY_PATH_COM }}/

  deploy-ru:
    name: Deploy redobureau.ru
    runs-on: ubuntu-latest
    # Stays skipped until you set repo variable RU_ENABLED=true.
    # Useful while the .ru server isn't provisioned yet — pushes to main
    # still deploy .com without failing the workflow.
    if: >-
      ${{ vars.RU_ENABLED == 'true'
          && (github.event_name != 'workflow_dispatch'
              || inputs.targets == 'both'
              || inputs.targets == 'ru') }}
    steps:
      - uses: actions/checkout@v4

      - name: Load SSH key into agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY_RU }}

      - name: Trust host key
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST_RU }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync to ${{ secrets.DEPLOY_HOST_RU }}
        run: |
          rsync -avz --delete \
            --exclude-from=.deployignore \
            -e "ssh -o StrictHostKeyChecking=accept-new" \
            ./ ${{ secrets.DEPLOY_USER_RU }}@${{ secrets.DEPLOY_HOST_RU }}:${{ secrets.DEPLOY_PATH_RU }}/
