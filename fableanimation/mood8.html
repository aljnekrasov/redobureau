<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Redo — Peldēšana</title>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%; overflow: hidden;
      background: #0e1418; user-select: none; -webkit-user-select: none;
    }
    #tank {
      position: fixed; inset: 0; overflow: hidden; touch-action: none;
      background: radial-gradient(ellipse at 50% 40%, #16222a, #0b1013 75%);
    }
    .fish {
      position: absolute; left: 0; top: 0; will-change: transform;
      border-radius: 3px; overflow: hidden;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.45);
      background: #1a252c;
    }
    .fish img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      opacity: 0; transition: opacity 0.8s ease; pointer-events: none;
    }
    .fish img.on { opacity: 1; }
    #caustic {
      position: fixed; inset: 0; pointer-events: none; z-index: 30; opacity: 0.5;
      background: radial-gradient(ellipse at 50% 0%, rgba(150, 210, 235, 0.16), transparent 55%);
    }
  </style>
</head>
<body>
  <div id="tank"></div>
  <div id="caustic"></div>
  <script type="module" src="mood8.js"></script>
</body>
</html>
