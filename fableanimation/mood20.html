<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Redo — Magnēts</title>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%; overflow: hidden;
      background: #101015; user-select: none; -webkit-user-select: none;
      cursor: crosshair;
    }
    #stage {
      position: fixed; inset: 0; overflow: hidden; touch-action: none;
      background: radial-gradient(ellipse at 50% 50%, #191922, #0c0c10 76%);
    }
    .bit {
      position: absolute; left: 0; top: 0; will-change: transform;
      overflow: hidden; border-radius: 2px; background: #1c1c24;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.5);
    }
    .bit img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      opacity: 0; transition: opacity 0.7s ease;
    }
    .bit img.on { opacity: 1; }
  </style>
</head>
<body>
  <div id="stage"></div>
  <script type="module" src="mood20.js"></script>
</body>
</html>
