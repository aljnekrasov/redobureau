<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Redo — Aizkari</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
      background: #0c0c0f; user-select: none; -webkit-user-select: none; }
    #stage { position: fixed; inset: 0; overflow: hidden; touch-action: none;
      perspective: 1200px; }
    .strip { position: absolute; top: -2%; height: 104%; will-change: transform;
      transform-origin: 50% 0; overflow: hidden; background: #16161a;
      box-shadow: inset -1px 0 0 rgba(0,0,0,0.5), 0 20px 40px rgba(0,0,0,0.3); }
    .strip img { width: 100%; height: 100%; object-fit: cover; display: block;
      opacity: 0; transition: opacity 0.8s ease; }
    .strip img.on { opacity: 1; }
  </style>
</head>
<body>
  <div id="stage"></div>
  <script type="module" src="mood45.js"></script>
</body>
</html>
