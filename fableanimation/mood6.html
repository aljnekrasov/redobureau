<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Redo — Bezgalība</title>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%; overflow: hidden;
      background: #14110f; user-select: none; -webkit-user-select: none;
    }
    #stage { position: fixed; inset: 0; overflow: hidden; touch-action: none; cursor: grab; }
    #stage.is-dragging { cursor: grabbing; }
    .tile {
      position: absolute; left: 0; top: 0; overflow: hidden;
      background: #211d1a; will-change: transform;
    }
    .tile img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      opacity: 0; transition: opacity 0.7s ease; pointer-events: none;
    }
    .tile img.on { opacity: 1; }
    #vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 40;
      background: radial-gradient(ellipse at 50% 50%, transparent 46%, rgba(0,0,0,0.5) 100%);
    }
  </style>
</head>
<body>
  <div id="stage"></div>
  <div id="vignette"></div>
  <script type="module" src="mood6.js"></script>
</body>
</html>
