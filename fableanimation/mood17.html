<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Redo — Ritenis</title>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%; overflow: hidden;
      background: #14110f; user-select: none; -webkit-user-select: none;
    }
    #stage {
      position: fixed; inset: 0; overflow: hidden; touch-action: none; cursor: grab;
      background: radial-gradient(ellipse at 50% 78%, #221d18, #100d0b 74%);
    }
    #stage.is-dragging { cursor: grabbing; }
    #pivot {
      position: absolute; left: 50%; top: 86%; width: 0; height: 0;
    }
    .card {
      position: absolute; left: 0; bottom: 0; transform-origin: 50% 100%;
      margin-left: 0; will-change: transform;
      background: #f4f1ea; padding: 8px; box-sizing: border-box;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
      transition: filter 0.3s;
    }
    .card .frame { width: 100%; height: 100%; overflow: hidden; background: #241f1b; }
    .card img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      opacity: 0; transition: opacity 0.7s ease;
    }
    .card img.on { opacity: 1; }
  </style>
</head>
<body>
  <div id="stage"><div id="pivot"></div></div>
  <script type="module" src="mood17.js"></script>
</body>
</html>
