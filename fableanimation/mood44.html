<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Redo — Domino</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
      background: #101013; user-select: none; -webkit-user-select: none; cursor: pointer;
      background: linear-gradient(#101013 55%, #16161b); }
    .row { position: absolute; left: 0; width: 100%; }
    .dom { position: absolute; bottom: 0; will-change: transform;
      transform-origin: 100% 100%; overflow: hidden; background: #1b1b21;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.45); border-radius: 2px; }
    .dom img { width: 100%; height: 100%; object-fit: cover; display: block;
      opacity: 0; transition: opacity 0.7s ease; }
    .dom img.on { opacity: 1; }
    /* floor line under each row */
    .row::after { content: ""; position: absolute; left: 4%; right: 4%; bottom: -1px;
      height: 1px; background: rgba(255, 255, 255, 0.07); }
  </style>
</head>
<body>
  <script type="module" src="mood44.js"></script>
</body>
</html>
