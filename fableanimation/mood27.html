<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Redo — Šūnas</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
      background: #101013; user-select: none; -webkit-user-select: none; }
    #stage { position: fixed; inset: 0; overflow: hidden; touch-action: none; }
    .cell {
      position: absolute; left: 0; top: 0; will-change: transform;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      background: #1a1a20; overflow: hidden;
    }
    .cell img { width: 100%; height: 100%; object-fit: cover; display: block;
      opacity: 0; transition: opacity 0.7s ease; }
    .cell img.on { opacity: 1; }
    .cell:hover { z-index: 100; }
  </style>
</head>
<body>
  <div id="stage"></div>
  <script type="module" src="mood27.js"></script>
</body>
</html>
