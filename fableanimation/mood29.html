<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Redo — Tunelis</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
      background: #050507; user-select: none; -webkit-user-select: none; }
    #view { position: fixed; inset: 0; overflow: hidden; touch-action: none;
      perspective: 900px; perspective-origin: 50% 50%; cursor: ns-resize;
      background: radial-gradient(ellipse at 50% 50%, #14141a, #050507 72%); }
    #world { position: absolute; left: 50%; top: 50%; width: 0; height: 0;
      transform-style: preserve-3d; }
    .panel { position: absolute; left: 0; top: 0; will-change: transform, opacity;
      overflow: hidden; background: #16161c; outline: 1px solid rgba(255,255,255,0.05); }
    .panel img { width: 100%; height: 100%; object-fit: cover; display: block;
      opacity: 0; transition: opacity 0.7s ease; }
    .panel img.on { opacity: 1; }
    #vignette { position: fixed; inset: 0; pointer-events: none; z-index: 40;
      background: radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(0,0,0,0.6) 100%); }
  </style>
</head>
<body>
  <div id="view"><div id="world"></div></div>
  <div id="vignette"></div>
  <script type="module" src="mood29.js"></script>
</body>
</html>
