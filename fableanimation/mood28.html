<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Redo — Lietus</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
      background: #050507; user-select: none; -webkit-user-select: none; }
    #stage { position: fixed; inset: 0; overflow: hidden; touch-action: none; display: flex; }
    .col { position: relative; height: 100%; flex: 1 1 0; overflow: hidden;
      -webkit-mask: linear-gradient(to top, #000 0%, #000 42%, transparent 96%);
      mask: linear-gradient(to top, #000 0%, #000 42%, transparent 96%); }
    .track { position: absolute; left: 0; top: 0; width: 100%; will-change: transform; }
    .drop { position: relative; overflow: hidden; background: #101014; }
    .drop img { width: 100%; height: 100%; object-fit: cover; display: block;
      opacity: 0; transition: opacity 0.6s ease; }
    .drop img.on { opacity: 1; }
  </style>
</head>
<body>
  <div id="stage"></div>
  <script type="module" src="mood28.js"></script>
</body>
</html>
