<!DOCTYPE html><html lang="lv"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>RAF AVIA — Morfoze</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:44px 20px;font-family:'Space Grotesk',Helvetica,Arial,sans-serif;background:#F4F2E9;color:#1E2B7B}
a{color:inherit;opacity:.55;text-decoration:none;font-size:11px;letter-spacing:.18em;text-transform:uppercase}
a:hover{opacity:1}
header{text-align:center}
.logo{font-size:12px;font-weight:700;letter-spacing:.32em;opacity:.65}
h1{margin:10px 0 4px;font-size:30px;letter-spacing:.04em;font-weight:700}
.en{font-size:11px;letter-spacing:.22em;text-transform:uppercase;opacity:.55;margin:0}
.stage{width:min(92vw,680px)}
.stage svg{display:block;width:100%;height:auto}
.st{stroke:#1E2B7B;fill:none;stroke-width:2}
.stg{stroke:#C09A2E;fill:none;stroke-width:2}
.fl{fill:#1E2B7B}
.flg{fill:#C09A2E}
.cap{max-width:500px;text-align:center;font-size:13px;line-height:1.55;opacity:.62;margin:0}
</style></head><body>
<header><div class="logo">RAF AVIA</div><h1>Morfoze</h1><p class="en">The Mark in Motion</p></header>
<div class="stage"><svg viewBox="0 0 480 360" xmlns="http://www.w3.org/2000/svg"><polygon points="240,60 360,180 240,300 120,180" class="st" opacity="0.25"/>
<g id="q0"><rect x="-17" y="-17" width="34" height="34" class="fl" transform="rotate(45)"/></g><g id="q1"><rect x="-17" y="-17" width="34" height="34" class="fl" transform="rotate(45)"/></g><g id="q2"><rect x="-17" y="-17" width="34" height="34" class="fl" transform="rotate(45)"/></g><g id="q3"><rect x="-17" y="-17" width="34" height="34" class="fl" transform="rotate(45)"/></g>
<g id="cg" transform="translate(240,180)" opacity="0"><rect x="-7" y="-7" width="14" height="14" class="flg" transform="rotate(45)"/></g></svg></div>
<p class="cap">One form, four directions, one form again — expansion that always returns home.</p>
<a href="../index.html">← Raksti / visi 40</a>
<script>
var $=function(id){return document.getElementById(id)};
function ez(u){return u<=0?0:u>=1?1:u*u*(3-2*u)}
function f(t){var T=6.4,u=(t%T)/T;
var m=ez(u/0.22)*(1-ez((u-0.72)/0.22));
var ang=ez((u-0.22)/0.5)*3.14159;
for(var i=0;i<4;i++){var a=i*1.5708+ang,R=95*m;
var X=240+R*Math.cos(a),Y=180+R*Math.sin(a);
$('q'+i).setAttribute('transform','translate('+X+','+Y+') rotate('+(ang*57.3)+') scale('+(1-0.25*m)+')');}
var cg=$('cg');cg.style.opacity=(1-m)*(u>0.05?1:u/0.05);
cg.setAttribute('transform','translate(240,180) scale('+(1+0.15*Math.sin(t*3))+')');}
var T0=performance.now();
function _loop(){f((performance.now()-T0)/1000);requestAnimationFrame(_loop)}
requestAnimationFrame(_loop);
</script>
</body></html>
