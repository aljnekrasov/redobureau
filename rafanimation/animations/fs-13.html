<div class="hud bl"><b>13 — Telegrāfa līnija · The Telegraph Line</b>Пакеты идут по линии жёсткими шагами; проходя золотые ворота, каждый меняет форму — квадраты становятся ромбами. Груз превращается в данные.</div>
<script>
var PJ=6;
function hsh(n){var v=Math.sin(n*127.1)*43758.5453;return v-Math.floor(v)}
function ez(u){return u<=0?0:u>=1?1:u*u*(3-2*u)}
function bo(u){if(u<=0)return 0;if(u>=1)return 1;var c=1.70158,v=u-1;return 1+(c+1)*v*v*v+c*v*v}
function $(id){return document.getElementById(id)}
function EL(s,n){var a=[];for(var i=0;i<n;i++)a.push(document.getElementById(s+i));return a}
var T0=performance.now();
function loop(){var t=(performance.now()-T0)/1000;try{tick(t)}catch(e){}requestAnimationFrame(loop)}
var ps=[],ms=[],as=[];for(var k=0;k<4;k++){ps.push($('p'+k));var mm=[],aa=[];
for(var j=0;j<PJ;j++){mm.push($('p'+k+'m'+j));aa.push($('p'+k+'a'+j));}ms.push(mm);as.push(aa);}
function tick(t){for(var k=0;k<4;k++){var cyc=(t*0.9+k*0.25)%1;
var stx=Math.floor(cyc*22)*48-96;
ps[k].setAttribute('transform','translate('+stx+',174)');
var past=stx>340;var inGate=stx>290&&stx<=340;var jit=inGate?(Math.floor(hsh(k*7+Math.floor(t*20))*3)-1)*6:0;
ps[k].setAttribute('transform','translate('+(stx+jit)+','+(174+(inGate?jit:0))+')');
for(var j=0;j<PJ;j++){ms[k][j].setAttribute('opacity',past?0:1);as[k][j].setAttribute('opacity',past?1:0);}}}
requestAnimationFrame(loop);
</script></body></html>
