<script>
var $=function(id){return document.getElementById(id)};
var P=[];for(var i=0;i<12;i++)P.push({ax:60+(i*37)%150,wx:0.26+((i*7)%10)*0.07,px:i*1.7,ay:48+(i*53)%110,wy:0.22+((i*11)%9)*0.08,py:i*2.3});
function f(t){var xs=[],ys=[];
for(var i=0;i<12;i++){var x=240+P[i].ax*Math.sin(P[i].wx*t+P[i].px),y=180+P[i].ay*Math.sin(P[i].wy*t+P[i].py);
xs.push(x);ys.push(y);$('n'+i).setAttribute('transform','translate('+x+','+y+')');}
var li=0;
for(var a=0;a<12;a++)for(var b=a+1;b<12;b++){var dx=xs[a]-xs[b],dy=ys[a]-ys[b],d=Math.sqrt(dx*dx+dy*dy),el=$('l'+li);
if(d<115){el.setAttribute('x1',xs[a]);el.setAttribute('y1',ys[a]);el.setAttribute('x2',xs[b]);el.setAttribute('y2',ys[b]);el.style.opacity=(1-d/115)*0.55;}
else el.style.opacity=0;li++;}}
var T0=performance.now();
function _loop(){f((performance.now()-T0)/1000);requestAnimationFrame(_loop)}
requestAnimationFrame(_loop);
</script>
