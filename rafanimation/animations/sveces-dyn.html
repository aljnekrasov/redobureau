<script>
var els=[].slice.call(document.querySelectorAll('[data-an]')).map(function(e){return{e:e,d:JSON.parse(e.getAttribute('data-an'))}});
var T0=performance.now();
function ez(u){return u<=0?0:u>=1?1:u*u*(3-2*u)}
function ezb(u){if(u<=0)return 0;if(u>=1)return 1;var c=1.70158,v=u-1;return 1+(c+1)*v*v*v+c*v*v}
function frame(){
 var t=(performance.now()-T0)/1000;
 for(var i=0;i<els.length;i++){
  var d=els[i].d,st=els[i].e.style,o=1,tr='';
  var cy=d.T?(t%d.T):t;
  if(d.k==='st2'){var a=ez((cy-d.at)/0.28),b=ezb(a),ex=ez((cy-(d.T-0.6))/0.35);o=a*(1-ex);tr='translate('+((1-b)*d.dx).toFixed(1)+'px,'+((1-b)*d.dy).toFixed(1)+'px) scale('+(0.3+0.7*b-0.3*ex).toFixed(2)+')';}
  else if(d.k==='chase'){var u=(t/d.T)%1,ds=((u-d.p)%1+1)%1,I=ds<0.12?1-ds/0.12:0;o=0.2+0.8*I;if(d.sc)tr='scale('+(1+d.sc*I).toFixed(2)+')';}
  else if(d.k==='soft'){o=d.a+d.b*Math.sin(t*d.w+d.ph);}
  else if(d.k==='eq'){var s=ezb((t-d.at)/0.5);if(t>d.at+0.6)s*=1+d.amp*Math.sin((t-d.at)*d.w+d.ph);if(s<0)s=0;tr='scaleY('+s.toFixed(3)+')';if(d.fl&&t>d.at+0.6)o=0.7+0.3*Math.sin(t*5);}
  else if(d.k==='jit'){tr='scaleY('+(1+d.a1*Math.sin(t*d.w1+d.p1)+d.a2*Math.sin(t*d.w2+d.p2)).toFixed(3)+')';}
  else if(d.k==='snap'){var kk=Math.floor(t/d.T),c2=t%d.T,uu=c2<d.at?0:ez((c2-d.at)/0.5);tr='rotate('+((kk+uu)*90*d.dir).toFixed(1)+'deg)';}
  else if(d.k==='spin'){tr='rotate('+((t*d.w*57.3)%360).toFixed(1)+'deg)';}
  else if(d.k==='core2'){o=0.7+0.3*Math.sin(t*4);tr='scale('+(1+0.2*Math.sin(t*4)).toFixed(2)+')';}
  else if(d.k==='w2'){var u2=(t/d.T)%1,d1=((u2-d.p)%1+1)%1,d2=((u2-d.p-0.16)%1+1)%1,I1=d1<0.1?1-d1/0.1:0,I2=d2<0.1?1-d2/0.1:0,II=Math.max(I1,0.65*I2);o=0.25+0.75*II;tr='scale('+(1+0.18*II).toFixed(2)+')';}
  else if(d.k==='sf'){var u3=(t/d.T)%1,ds3=((u3-d.p)%1+1)%1,band=ds3<0.07,fl=Math.sin(t*d.w+d.ph)*Math.sin(t*d.w2+d.ph2)>0.15;o=band?1:(d.st?0.9:(fl?0.85:0.15));}
  else if(d.k==='fall'){tr='translateY('+((t*d.v)%d.wrap).toFixed(1)+'px)';}
  st.opacity=o;if(tr)st.transform=tr;
 }
 requestAnimationFrame(frame);
}
