<script>
var $=function(id){return document.getElementById(id)};
var arc=$('arc'),L=arc.getTotalLength(),pl=$('pl'),pr=$('pr');
function ez(u){return u<=0?0:u>=1?1:u*u*(3-2*u)}
function f(t){var T=5.2,u=(t%T)/T;
var d1=ez(u/0.34)*L,w2=ez((u-0.78)/0.2)*L,v=ez((u-0.32)/0.3);
arc.setAttribute('stroke-dasharray',Math.max(0.01,d1-w2)+' '+L);
arc.setAttribute('stroke-dashoffset',-w2);
var vis=v>0&&v<1;pl.style.opacity=vis?1:0;
if(vis){var a=arc.getPointAtLength(v*L),b=arc.getPointAtLength(Math.max(0,v*L-5));
pl.setAttribute('transform','translate('+a.x+','+a.y+') rotate('+(Math.atan2(a.y-b.y,a.x-b.x)*57.3)+')');}
var pu=ez((u-0.6)/0.25);pr.setAttribute('r',6+34*pu);pr.style.opacity=pu>0&&pu<1?(1-pu)*0.9:0;}
var T0=performance.now();
function _loop(){f((performance.now()-T0)/1000);requestAnimationFrame(_loop)}
requestAnimationFrame(_loop);
</script>
