<script>
var els=[].slice.call(document.querySelectorAll('[data-an]')).map(function(e){return{e:e,d:JSON.parse(e.getAttribute('data-an'))}});
var T0=performance.now();
function ez(u){return u<=0?0:u>=1?1:u*u*(3-2*u)}
function frame(){
 var t=(performance.now()-T0)/1000;
 for(var i=0;i<els.length;i++){
  var d=els[i].d,st=els[i].e.style,o=1,tr='';
  var cy=d.T?(t%d.T):t;
  if(d.k==='stitch'){var a=ez((cy-d.at)/0.35),b=ez((cy-(d.T-1.1))/0.6);o=a*(1-b);tr='scale('+(0.25+0.75*o)+')';}
  else if(d.k==='wave'){var u=(t/d.T)%1,ds=((u-d.p)%1+1)%1;o=ds<0.16?0.3+0.7*(1-ds/0.16):0.3;}
  else if(d.k==='soft'){o=d.a+d.b*Math.sin(t*d.w+d.ph);}
  else if(d.k==='grow'){var s=ez((cy-d.at)/0.7),f=1-ez((cy-(d.T-0.9))/0.5);s=s*f;tr='scaleY('+s+')';o=f;if(d.g&&s>0.99){o=0.7+0.3*Math.sin(t*3);}}
  else if(d.k==='breathe'){tr='scaleY('+(1+d.amp*Math.sin(t*d.w+d.ph))+')';}
  else if(d.k==='flicker'){o=(Math.sin(t*d.w+d.ph)*Math.sin(t*d.w2+d.ph2)>0.15)?1:0.15;}
  else if(d.k==='ring'){var ph=((cy-d.at)%d.T+d.T)%d.T;o=0.3+0.7*Math.exp(-1.6*ph);}
  else if(d.k==='core'){o=0.75+0.25*Math.sin(t*2);tr='scale('+(1+0.12*Math.sin(t*2))+')';}
  else if(d.k==='fall'){tr='translateY('+((t*d.v)%d.wrap)+'px)';}
  st.opacity=o;if(tr)st.transform=tr;
 }
 requestAnimationFrame(frame);
}
requestAnimationFrame(frame);</script>
