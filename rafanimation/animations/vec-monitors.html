<script>
var $=function(id){return document.getElementById(id)};
function G(p,c,w){var d=(p-c)/w;return Math.exp(-d*d)}
function sig(p){return 0.12*G(p,0.18,0.03)-0.16*G(p,0.30,0.012)+1.0*G(p,0.335,0.012)-0.32*G(p,0.37,0.015)+0.22*G(p,0.58,0.045)}
function f(t){var N=160,dt=0.012,pts='',lx=0,ly=0;
for(var k=0;k<N;k++){var tk=t-(N-1-k)*dt,ph=((tk/1.05)%1+1)%1,y=232-150*sig(ph),x=k*3;pts+=x+','+y+' ';lx=x;ly=y;}
$('ek').setAttribute('points',pts);$('hd').setAttribute('cx',lx);$('hd').setAttribute('cy',ly);}
var T0=performance.now();
function _loop(){f((performance.now()-T0)/1000);requestAnimationFrame(_loop)}
requestAnimationFrame(_loop);
</script>
