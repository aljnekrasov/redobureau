<!DOCTYPE html><html lang="lv"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>RAF AVIA — Orbīta</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:44px 20px;font-family:'Space Grotesk',Helvetica,Arial,sans-serif;background:#1E2B7B;color:#F4F2E9}
a{color:inherit;opacity:.55;text-decoration:none;font-size:11px;letter-spacing:.18em;text-transform:uppercase}
a:hover{opacity:1}
header{text-align:center}
.logo{font-size:12px;font-weight:700;letter-spacing:.32em;opacity:.65}
h1{margin:10px 0 4px;font-size:30px;letter-spacing:.04em;font-weight:700}
.en{font-size:11px;letter-spacing:.22em;text-transform:uppercase;opacity:.55;margin:0}
.stage{width:min(92vw,680px)}
.stage svg{display:block;width:100%;height:auto}
.st{stroke:#F4F2E9;fill:none;stroke-width:2}
.stg{stroke:#C09A2E;fill:none;stroke-width:2}
.fl{fill:#F4F2E9}
.flg{fill:#C09A2E}
.cap{max-width:500px;text-align:center;font-size:13px;line-height:1.55;opacity:.62;margin:0}
</style></head><body>
<header><div class="logo">RAF AVIA</div><h1>Orbīta</h1><p class="en">Orbits</p></header>
<div class="stage"><svg viewBox="0 0 480 360" xmlns="http://www.w3.org/2000/svg"><ellipse cx="240" cy="180" rx="200" ry="64" class="st" opacity="0.3" transform="rotate(-18 240 180)"/><ellipse cx="240" cy="180" rx="150" ry="105" class="st" opacity="0.3" transform="rotate(22 240 180)"/><ellipse cx="240" cy="180" rx="82" ry="132" class="st" opacity="0.3" transform="rotate(64 240 180)"/><g id="s0"><rect x="-6.5" y="-6.5" width="13" height="13" class="fl" transform="rotate(45)"/></g><g id="s1"><rect x="-6.5" y="-6.5" width="13" height="13" class="fl" transform="rotate(45)"/></g><g id="s2"><rect x="-5" y="-5" width="10" height="10" class="fl" transform="rotate(45)"/></g><g id="gc"><rect x="-10" y="-10" width="20" height="20" class="flg" transform="rotate(45)"/></g></svg></div>
<p class="cap">Constant motion around a golden core — the network never stops turning.</p>
<a href="../index.html">← Raksti / visi 40</a>
<script>
var $=function(id){return document.getElementById(id)};
var R=[{rx:200,ry:64,rot:-0.314,w:0.55,ph:0},{rx:150,ry:105,rot:0.384,w:-0.4,ph:2.1},{rx:82,ry:132,rot:1.117,w:0.85,ph:4.4}];
function f(t){for(var i=0;i<3;i++){var r=R[i],a=r.w*t+r.ph,x=r.rx*Math.cos(a),y=r.ry*Math.sin(a);
var X=240+x*Math.cos(r.rot)-y*Math.sin(r.rot),Y=180+x*Math.sin(r.rot)+y*Math.cos(r.rot);
$('s'+i).setAttribute('transform','translate('+X+','+Y+') rotate('+(t*40)+')');}
$('gc').setAttribute('transform','translate(240,180) scale('+(1+0.12*Math.sin(t*2.4))+')');}
var T0=performance.now();
function _loop(){f((performance.now()-T0)/1000);requestAnimationFrame(_loop)}
requestAnimationFrame(_loop);
</script>
</body></html>
