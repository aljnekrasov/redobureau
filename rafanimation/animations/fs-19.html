<script>

function hsh(n){var v=Math.sin(n*127.1)*43758.5453;return v-Math.floor(v)}
function ez(u){return u<=0?0:u>=1?1:u*u*(3-2*u)}
function bo(u){if(u<=0)return 0;if(u>=1)return 1;var c=1.70158,v=u-1;return 1+(c+1)*v*v*v+c*v*v}
function $(id){return document.getElementById(id)}
function EL(s,n){var a=[];for(var i=0;i<n;i++)a.push(document.getElementById(s+i));return a}
var T0=performance.now();
function loop(){var t=(performance.now()-T0)/1000;try{tick(t)}catch(e){}requestAnimationFrame(loop)}
var rs=EL('R',12);function tick(t){for(var r=0;r<12;r++){
