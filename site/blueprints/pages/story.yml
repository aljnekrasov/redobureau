title: Story
icon: 🗒

num: '{{ page.date.toDate("Ymd") }}'

status:
  draft:
    label: Draft
    text: This page is still in draft mode. It can only be seen by editors with Panel access.
  listed:
    label: Published
    text: This page is available for viewing.

columns:
  - width: 3/4
    sections:
      info:
        type: fields
        fields:
          date:
            label: Publish date
            type: date
            required: true
            default: today
            width: 1/2
          authors:
            label: Authors
            type: multiselect
            width: 1/2
            options: query
            query:
              fetch: site.team.toStructure
              text: "{{ structureItem.name }}"
              value: "{{ structureItem.name }}"
          intro:
            label: Intro
            type: textarea
            size: small
            buttons: false
            help: >
              1-2 sentences, 200-300 chars. Shows on the listing card and
              becomes the meta description of the article.
          types:
            label: Topics
            type: multiselect
            width: 1/2
            options: query
            query:
              fetch: site.worktypes.toStructure
              text: "{{ structureItem.name }}"
              value: "{{ structureItem.name }}"
      content:
        type: fields
        fields:
          body:
            label: Content
            type: builder
            fieldsets:
              block-text:
                label: Text
                fields:
                  text:
                    label: false
                    type: textarea
                    size: medium
              block-pictures:
                label: Images
                fields:
                  pictures:
                    label:
                    type: files
                    layout: cards
                    text:
                    info:
                    image:
                      cover: false
                      ratio: 1/1
                      back: black
              block-quote:
                label: Quote
                fields:
                  text:
                    label: Quote
                    type: textarea
                    size: small
                    buttons: false
                  cite:
                    label: Source
                    type: text
              block-video:
                label: Video
                fields:
                  videoID:
                    label: Vimeo video ID
                    type: text
                    placeholder: 3432886
      related:
        type: fields
        fields:
          related:
            label: Related projects
            type: pages
            layout: cards
            query: site.children.template('work').children.published
            max: 3

  - width: 1/4
    sections:
      audienceBox:
        type: fields
        fields:
          audience:
            label: Audience
            type: checkboxes
            options:
              intl: International (redobureau.com)
              ru: Russia (redobureau.ru)
            default: [intl, ru]
            required: true
            help: Which sites this article appears on.
      cover:
        type: files
        headline: Cover
        layout: cards
        info: false
        template: heroCover
        max: 1
      previewCover:
        type: files
        headline: Preview cover
        template: previewCover
        layout: cards
        info: "{{ file.dimensions }}"
        max: 1
      share:
        type: fields
        fields:
          og_title:
            label: Open Graph Title
            type: text
          sharetext:
            label: Share text
            type: textarea
            size: small
            buttons: false
      files:
        type: files
        headline: Files
        info: "{{ file.dimensions }}"
