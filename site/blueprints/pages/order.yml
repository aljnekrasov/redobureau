title: Order
icon: 📦

options:
  url: false
  changeSlug: false

fields:
  orderStatus:
    label: Status
    type: select
    width: 1/3
    options:
      paid: Paid
      shipped: Shipped
      done: Done
      refunded: Refunded
  orderDate:
    label: Date
    type: text
    width: 1/3
    disabled: true
  amount:
    label: Amount
    type: text
    width: 1/3
    disabled: true
  products:
    label: Items
    type: textarea
    size: small
    buttons: false
    disabled: true
  tracking:
    label: Tracking number
    type: text
    width: 1/2
    help: Shown to the customer on the order-status page once status = Shipped
  trackingUrl:
    label: Tracking URL
    type: url
    width: 1/2
    help: Carrier link (DHL/UPS/…) — becomes a link on the status page
  customerName:
    label: Customer
    type: text
    width: 1/2
    disabled: true
  customerEmail:
    label: Email
    type: text
    width: 1/2
    disabled: true
  shippingAddress:
    label: Ship to
    type: textarea
    size: small
    buttons: false
    disabled: true
  sessionId:
    label: Stripe session
    type: text
    disabled: true
  notes:
    label: Notes
    type: textarea
    size: small
    buttons: false
    help: Internal — tracking number, fulfilment notes
